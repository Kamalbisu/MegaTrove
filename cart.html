<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Cart - MegaTrove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="p-3 text-bg-dark">
        <div class="container-fluid px-4">
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                <a href="home.html" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                    <span class="fs-4 fw-bold text-white">Mega</span><span class="fs-4 fw-bold text-warning">Trove</span>
                </a>
                <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                    <li><a href="home.html" class="nav-link px-2 text-white">Home</a></li>
                    <li><a href="features.html" class="nav-link px-2 text-white">Features</a></li>
                    <li><a href="pricing.html" class="nav-link px-2 text-white">Pricing</a></li>
                    <li><a href="faqs.html" class="nav-link px-2 text-white">FAQs</a></li>
                    <li><a href="about.html" class="nav-link px-2 text-white">About</a></li>
                </ul>
                <div class="text-end d-flex align-items-center">
                    <a href="cart.html" class="btn btn-outline-light me-3">
                        🛒 Cart (<span id="cart-count">0</span>)
                    </a>
                    <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                    <a href="login.html" class="btn btn-warning">Sign-up</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container my-5" style="min-height: 60vh;">
        <h2 class="fw-bold mb-4">Shopping Cart</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body" id="cart-items-container">
                        <h5 class="text-center text-muted my-4">Cart is loading...</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mt-4 mt-md-0">
                <div class="card shadow-sm border-0 p-3">
                    <h5 class="fw-bold border-bottom pb-3">Order Summary</h5>
                    <div class="d-flex justify-content-between mt-3">
                        <span>Total Items:</span>
                        <span id="summary-items" class="fw-bold">0</span>
                    </div>
                    <div class="d-flex justify-content-between mt-3 mb-3">
                        <span class="fs-5">Total Price:</span>
                        <span id="summary-price" class="fs-5 fw-bold text-success">₹0</span>
                    </div>
                    <button class="btn btn-warning w-100 fw-bold" onclick="alert('Checkout processing via Phone Pay/Card...')">Proceed to Checkout</button>
                    <button class="btn btn-outline-danger w-100 fw-bold mt-2" onclick="clearCart()">Clear Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="cart.js"></script>
    <script>
        // Sirf Cart Page ke liye logic
        document.addEventListener('DOMContentLoaded', () => {
            renderCartItems();
        });

        function renderCartItems() {
            const container = document.getElementById('cart-items-container');
            let cart = JSON.parse(localStorage.getItem('megaTroveCart')) || [];
            
            if (cart.length === 0) {
                container.innerHTML = `<h5 class="text-center text-muted my-5">Your cart is empty! 🛍️</h5>`;
                document.getElementById('summary-items').innerText = '0';
                document.getElementById('summary-price').innerText = '₹0';
                return;
            }

            container.innerHTML = ''; // Clear container
            let totalPrice = 0;

            cart.forEach((item, index) => {
                // Price math calculations
                let priceNum = parseInt(item.priceText.replace(/[^0-9]/g, ''));
                totalPrice += priceNum;

                container.innerHTML += `
                    <div class="d-flex align-items-center border-bottom pb-3 mb-3">
                        <img src="${item.imgSrc}" alt="${item.title}" class="rounded" style="width: 80px; height: 80px; object-fit: cover;">
                        <div class="ms-3 flex-grow-1">
                            <h6 class="fw-bold mb-1">${item.title}</h6>
                            <span class="text-success fw-bold">${item.priceText}</span>
                        </div>
                        <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">Remove</button>
                    </div>
                `;
            });

            document.getElementById('summary-items').innerText = cart.length;
            document.getElementById('summary-price').innerText = '₹' + totalPrice.toLocaleString('en-IN');
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('megaTroveCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('megaTroveCart', JSON.stringify(cart));
            renderCartItems();
            updateCartCount();
        }

        function clearCart() {
            localStorage.removeItem('megaTroveCart');
            renderCartItems();
            updateCartCount();
        }
    </script>
</body>
</html>
