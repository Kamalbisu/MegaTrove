<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Checkout - MegaTrove</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="p-3 bg-white border-bottom text-center">
        <a href="home.html" class="text-dark text-decoration-none fs-4 fw-bold">Mega</a>
        <a href="home.html" class="text-warning text-decoration-none fs-4 fw-bold">Trove</a>
        <p class="small text-muted mb-0">Secure Checkout Page</p>
    </header>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-7">
                <h4 class="fw-bold mb-4">Billing Details</h4>
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <form>
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label for="firstName" class="form-label">First Name</label>
                                <input id="firstName" type="text" class="form-control" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="lastName" class="form-label">Last Name</label>
                                <input id="lastName" type="text" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label for="address" class="form-label">Address</label>
                                <input id="address" type="text" class="form-control" placeholder="1234 Main St" required>
                            </div>
                            <div class="col-md-5">
                                <label for="city" class="form-label">City</label>
                                <input id="city" type="text" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label for="state" class="form-label">State</label>
                                <select id="state" class="form-select">
                                    <option>Rajasthan</option>
                                    <option>Delhi</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="zip" class="form-label">Zip</label>
                                <input id="zip" type="text" class="form-control" required>
                            </div>
                        </div>
                    </form>
                </div>

                <h4 class="fw-bold my-4">Payment Method</h4>
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="payment" id="upi" checked>
                        <label class="form-check-label fw-bold" for="upi">UPI / Phone Pay</label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="payment" id="card">
                        <label class="form-check-label fw-bold" for="card">Credit/Debit Card</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" id="cod">
                        <label class="form-check-label fw-bold" for="cod">Cash on Delivery (COD)</label>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 mt-4 mt-lg-0">
                <h4 class="fw-bold mb-4">Order Summary</h4>
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <div class="d-flex justify-content-between mb-3">
                        <span>Product 1 (x1)</span>
                        <span class="fw-bold">₹1,299</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Product 2 (x1)</span>
                        <span class="fw-bold">₹899</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Shipping</span>
                        <span class="text-success fw-bold">Free</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4 fs-5">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold text-warning">₹2,198</span>
                    </div>
                    <button class="btn btn-warning btn-premium w-100 py-3 fw-bold rounded-pill" onclick="alert('Order Placed Successfully! 🎉')">
                        Place Order
                    </button>
                    <p class="small text-muted text-center mt-3">🔒 Your data is encrypted and secure.</p>
                </div>
            </div>
        </div>
    </div>
<div id="checkout-items" class="mb-3">
</div>
<div class="d-flex justify-content-between">
    <span class="fw-bold">Total Amount:</span>
    <span id="checkout-total" class="fw-bold text-warning">₹0</span>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
